services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rdio}
      POSTGRES_USER: ${POSTGRES_USER:-rdio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rdio}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rdio} -d ${POSTGRES_DB:-rdio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  icecast:
    image: moul/icecast
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:-sourcepass}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:-adminpass}
      ICECAST_RELAY_PASSWORD: ${ICECAST_RELAY_PASSWORD:-relaypass}
      ICECAST_HOSTNAME: ${ICECAST_HOSTNAME:-localhost}
    ports:
      - "8000:8000"

  liquidsoap:
    image: savonet/liquidsoap:v2.2.5
    depends_on:
      - icecast
    environment:
      ICECAST_HOST: icecast
      ICECAST_PORT: "8000"
      HARBOR_PORT: "8005"
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:-sourcepass}
    volumes:
      - ./services/liquidsoap:/rdio:ro
      - ./media:/media
    ports:
      - "8005:8005"
    command: liquidsoap /rdio/station.liq

volumes:
  postgres_data:
