# Replace "rdio-icecast" with your chosen globally-unique Fly app name.
app = "rdio-icecast"
primary_region = "lhr"

[build]
  image = "moul/icecast"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = "off"
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
