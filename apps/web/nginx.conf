server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API traffic behind /api so SPA routes like /members and /schedule
    # can still refresh to index.html.
    location ^~ /api/ {
        proxy_pass https://rdio-api.fly.dev;
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /live.mp3 {
        proxy_pass https://rdio-api.fly.dev/live.mp3;
        proxy_ssl_server_name on;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host rdio-api.fly.dev;
    }

    # SPA: serve index.html for all unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets
    location ~* \.(js|css|woff2?|ico|png|jpg|jpeg|svg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the entry point
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
